  <body>
    <div id="error-overlay" style="display: none; position: fixed; inset: 0; background: rgba(255,0,0,0.9); color: white; z-index: 999999; padding: 40px; font-family: monospace; overflow-y: auto;">
      <h2>Something went wrong</h2>
      <pre id="error-message" style="white-space: pre-wrap; font-size: 16px;"></pre>
    </div>
    <script>
      window.addEventListener('error', function(e) {
        document.getElementById('error-overlay').style.display = 'block';
        document.getElementById('error-message').textContent = e.message + '\n\n' + e.error?.stack;
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('error-overlay').style.display = 'block';
        document.getElementById('error-message').textContent = 'Unhandled Rejection: ' + e.reason;
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
